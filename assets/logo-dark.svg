<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Tail -->
  <polygon points="64,96 54,112 74,112" fill="#F05A52"/>
  <polygon points="64,108 58,118 70,118" fill="#E04A42"/>
  <!-- Body -->
  <ellipse cx="64" cy="72" rx="28" ry="24" fill="#F05A52"/>
  <ellipse cx="64" cy="78" rx="18" ry="14" fill="#F4A39C"/>
  <!-- Claw arms -->
  <rect x="36" y="48" width="10" height="18" rx="4" fill="#F05A52" transform="rotate(-20 41 57)"/>
  <rect x="82" y="48" width="10" height="18" rx="4" fill="#F05A52" transform="rotate(20 87 57)"/>
  <!-- Left claw -->
  <circle cx="30" cy="45" r="14" fill="#F05A52"/>
  <circle cx="30" cy="45" r="9" fill="#F4A39C"/>
  <!-- Right claw -->
  <circle cx="98" cy="45" r="14" fill="#F05A52"/>
  <circle cx="98" cy="45" r="9" fill="#F4A39C"/>
  <!-- Eyes -->
  <circle cx="54" cy="60" r="7" fill="white"/>
  <circle cx="74" cy="60" r="7" fill="white"/>
  <circle cx="56" cy="60" r="3" fill="#222"/>
  <circle cx="76" cy="60" r="3" fill="#222"/>
  <circle cx="54" cy="58" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="74" cy="58" r="1.5" fill="white" opacity="0.8"/>
  <!-- Antennae -->
  <path d="M58,52 Q52,30 42,22" stroke="#F05A52" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M70,52 Q76,30 86,22" stroke="#F05A52" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="22" r="2.5" fill="#F4A39C"/>
  <circle cx="86" cy="22" r="2.5" fill="#F4A39C"/>
  <!-- Smile -->
  <path d="M58,70 Q64,76 70,70" stroke="#D44A42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="48" cy="70" rx="4" ry="2.5" fill="#F4A39C" opacity="0.6"/>
  <ellipse cx="80" cy="70" rx="4" ry="2.5" fill="#F4A39C" opacity="0.6"/>
  <!-- Glasses - white outline for dark bg -->
  <circle cx="54" cy="60" r="9" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
  <circle cx="74" cy="60" r="9" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
  <line x1="63" y1="60" x2="65" y2="60" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="45" y1="59" x2="40" y2="56" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="83" y1="59" x2="88" y2="56" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <!-- Book in right claw - white outline -->
  <g transform="translate(96,34) rotate(15)">
    <rect x="-9" y="-7" width="9" height="14" rx="1" fill="#9B59B6" stroke="white" stroke-width="0.5"/>
    <rect x="0" y="-7" width="9" height="14" rx="1" fill="#A96DC8" stroke="white" stroke-width="0.5"/>
    <line x1="-7" y1="-3" x2="-2" y2="-3" stroke="white" stroke-width="0.8"/>
    <line x1="-7" y1="0" x2="-2" y2="0" stroke="white" stroke-width="0.8"/>
    <line x1="-7" y1="3" x2="-4" y2="3" stroke="white" stroke-width="0.8"/>
    <line x1="2" y1="-3" x2="7" y2="-3" stroke="white" stroke-width="0.8"/>
    <line x1="2" y1="0" x2="7" y2="0" stroke="white" stroke-width="0.8"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="white" stroke-width="0.8"/>
  </g>
</svg>
