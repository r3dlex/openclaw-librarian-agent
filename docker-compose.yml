services:
  librarian:
    build: .
    container_name: openclaw-librarian
    restart: always
    env_file: .env
    volumes:
      # Obsidian vault (read/write)
      - ${LIBRARIAN_VAULT_PATH}:/vault
      # Primary data folder with staging/, log/, backups/, processed/ (read/write)
      - ${LIBRARIAN_PRIMARY_DATA_FOLDER}:/data
      # Local project directory as secondary data folder (read/write)
      - .:/project-data
      # SQLite database persistence
      - librarian-db:/app/priv/data
    environment:
      - LIBRARIAN_VAULT_PATH=/vault
      - LIBRARIAN_DATA_FOLDER=/data,/project-data
      - LIBRARIAN_INPUT_PATHS=/project-data/input
      - LIBRARIAN_DB_PATH=/app/priv/data/librarian.db
      - MIX_ENV=prod
      - ATLASSIAN_1_LABEL=${ATLASSIAN_1_LABEL:-}
      - ATLASSIAN_1_URL=${ATLASSIAN_1_URL:-}
      - ATLASSIAN_1_EMAIL=${ATLASSIAN_1_EMAIL:-}
      - ATLASSIAN_1_TOKEN=${ATLASSIAN_1_TOKEN:-}
      - ATLASSIAN_2_LABEL=${ATLASSIAN_2_LABEL:-}
      - ATLASSIAN_2_URL=${ATLASSIAN_2_URL:-}
      - ATLASSIAN_2_EMAIL=${ATLASSIAN_2_EMAIL:-}
      - ATLASSIAN_2_TOKEN=${ATLASSIAN_2_TOKEN:-}
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pipeline-runner:
    build:
      context: ./tools/pipeline_runner
    container_name: openclaw-pipeline-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project:ro
    working_dir: /project
    profiles: ["tools"]

volumes:
  librarian-db:
