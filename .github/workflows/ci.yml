name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python Pipeline Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pipeline_runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Run tests
        run: poetry run pytest

  elixir-compile:
    name: Elixir Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

  elixir-tests:
    name: Elixir Tests
    runs-on: ubuntu-latest
    needs: elixir-compile
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run tests
        run: mix test

  archgate-check:
    name: ADR Compliance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pipeline_runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Validate ADR frontmatter
        run: poetry run pytest tests/test_pipelines.py::TestADRFrontmatter -v

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Librarian image
        run: docker build -t openclaw-librarian:ci .

      - name: Build Pipeline Runner image
        run: docker build -t openclaw-pipeline-runner:ci ./tools/pipeline_runner

  sensitive-data-check:
    name: Sensitive Data Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive patterns
        run: |
          ERRORS=0

          # Check for real email addresses
          if grep -rn '@gmail\.com\|@yahoo\.com\|@hotmail\.com' \
            --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.ex' --include='*.exs' --include='*.py' \
            --exclude-dir=.git . ; then
            echo "ERROR: Found email addresses in committed files"
            ERRORS=$((ERRORS + 1))
          fi

          # Check for API key patterns
          if grep -rn 'sk-[a-zA-Z0-9]\{20,\}' \
            --exclude-dir=.git . ; then
            echo "ERROR: Found API key patterns in committed files"
            ERRORS=$((ERRORS + 1))
          fi

          # Check for absolute user paths (exclude this workflow file to avoid self-match)
          if grep -rn '/Users/\|/home/\|/Volumes/' \
            --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.ex' --include='*.exs' --include='*.py' \
            --exclude=ci.yml --exclude-dir=.git . ; then
            echo "ERROR: Found absolute user paths in committed files"
            ERRORS=$((ERRORS + 1))
          fi

          # Verify .env is not tracked
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked by git"
            ERRORS=$((ERRORS + 1))
          fi

          # Verify spec/LIBRARIES.md is not tracked
          if git ls-files --error-unmatch spec/LIBRARIES.md 2>/dev/null; then
            echo "ERROR: spec/LIBRARIES.md is tracked by git"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS sensitive data issue(s)"
            exit 1
          fi

          echo "OK: No sensitive data found"
